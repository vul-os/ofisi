# .github/workflows/ci.yml — build, test, and vet vulos-office (Go + frontend)
#
# Triggers on:
#   - push to any branch
#   - pull request
#
# Jobs:
#   go-ci      — build, test (short), vet the Go backend
#   frontend   — npm ci, build, test the frontend

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Restrict default permissions to read-only; no job needs write access.
permissions:
  contents: read

jobs:

  # ── Go backend ──────────────────────────────────────────────────────────────
  go-ci:
    name: Go build / test / vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test (short)
        run: go test -short ./...

      - name: Vet
        run: go vet ./...

  # ── Go backend — Postgres integration ───────────────────────────────────────
  # Runs the full Go test suite with VULOS_TEST_POSTGRES_DSN set so the
  # dual-backend contract tests (backend_contract_test.go,
  # fileacl_postgres_test.go) exercise a real Postgres instance in the
  # "office" schema. Depends on the base go-ci job succeeding first.
  go-postgres:
    name: Go test (Postgres — schema office)
    runs-on: ubuntu-latest
    needs: go-ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vulos
          POSTGRES_PASSWORD: vulos
          POSTGRES_DB: vulos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vulos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with Postgres backend
        env:
          VULOS_TEST_POSTGRES_DSN: "postgres://vulos:vulos@localhost:5432/vulos_test?sslmode=disable"
        run: go test ./backend/storage/... -v -count=1

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend build / test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Checkout sibling vulos-relay
        run: git clone --depth 1 https://github.com/vul-os/vulos-relay ../vulos-relay

      - name: Install and build sibling vulos-apps/ui
        run: cd ../vulos-apps/ui && npm install

      - name: Install and build sibling vulos-relay client
        run: cd ../vulos-relay/client && npm install && npm run build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ── Frontend E2E (Playwright) ───────────────────────────────────────────────
  # Browser-level end-to-end tests against a production `vite preview` build,
  # with the /v1 + doc APIs mocked in-browser (see e2e/fixtures.js). No Go
  # backend required — the suite is hermetic.
  e2e:
    name: Frontend E2E (Playwright / chromium)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Checkout sibling vulos-relay
        run: git clone --depth 1 https://github.com/vul-os/vulos-relay ../vulos-relay

      - name: Install and build sibling vulos-apps/ui
        run: cd ../vulos-apps/ui && npm install

      - name: Install and build sibling vulos-relay client
        run: cd ../vulos-relay/client && npm install && npm run build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Real P2P integration E2E (relayd + two standalone servers) ──────────────
  # The opposite of the job above: nothing is mocked. It builds a real
  # `vulos-relayd` from the sibling checkout (READ-ONLY — only `go build`), runs
  # two standalone `vulos-office` servers pointed at its rendezvous role, and
  # proves that two browsers collaborate peer-to-peer through it with no Vulos
  # OS and no account — the repo's central architectural claim. Deliberately a
  # SEPARATE job so its heavier, WebRTC-dependent runtime can never destabilise
  # the fast suites.
  e2e-p2p:
    name: Real P2P E2E (relayd rendezvous)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sibling vulos-relay
        run: git clone --depth 1 https://github.com/vul-os/vulos-relay ../vulos-relay

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # Built here rather than inside the suite so a broken relay checkout is
      # reported as what it is, and never mistaken for a failure of the claim.
      - name: Build vulos-relayd (from the unmodified sibling checkout)
        run: cd ../vulos-relay && go build -o "$RUNNER_TEMP/vulos-relayd" ./cmd/vulos-relayd

      - name: Run real P2P E2E
        run: npm run test:e2e:p2p
        env:
          CI: 'true'
          VULOS_RELAYD_BIN: ${{ runner.temp }}/vulos-relayd

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-p2p
          path: playwright-report/
          retention-days: 7
