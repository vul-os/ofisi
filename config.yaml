# Ofisi Configuration

server:
  addr: ":8080"
  data_dir: "./data"
  uploads_dir: "./uploads"

auth:
  enabled: false          # Set to true to require login
  password: "changeme"    # Password for login (only used if enabled: true)
  max_attempts: 5         # Lockout after N failed attempts
  lockout_minutes: 15     # Lock duration in minutes
  session_hours: 24       # Session expiry in hours

storage:
  type: "local"           # "local" or "postgres"
  # PostgreSQL connection (only used if type: "postgres")
  postgres:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: ""
    database: "vulos_office"
    sslmode: "disable"

persistence:
  # CRDT-native persistence. When true, expose the per-file append-only update
  # log (POST/GET /api/files/:id/updates) that keeps every CRDT frame so
  # divergent offline edits converge with nothing discarded. ADDITIVE: the
  # whole-document PUT keeps working and the frontend dual-writes, so toggling
  # this never loses a document. The store backend follows storage.type
  # (local/s3 -> filesystem <data_dir>/updates/<id>/; postgres -> office.file_updates
  # + office.file_update_snapshots). Frame appends are storage-quota metered.
  # Env override: VULOS_PERSISTENCE_UPDATELOG / OFISI_UPDATE_LOG.
  updatelog: false

collab:
  # Base URL of any vulos-relayd's OPEN rendezvous surface (announce/resolve/
  # signal/mailbox + ICE), consumed DIRECTLY by the browser. Set this and a
  # STANDALONE Ofisi (which serves no /api/peering/*, see main.go) gets real
  # peer-to-peer collaboration with NO Vulos OS / host box required — any
  # self-hosted relayd is enough (e.g. "https://relay.example.org"). Leave
  # blank (default) to keep today's behaviour: host-box /api/peering/* when
  # present, local-only otherwise. Exposed read-only to the browser at
  # GET /api/reachability. Env override: VULOS_RENDEZVOUS_URL / OFISI_RENDEZVOUS_URL.
  # See docs/COLLABORATION.md §3 and docs/CONFIGURATION.md.
  rendezvous_url: ""
