<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Ofisi">
  <title>Ofisi</title>
  <defs>
    <!-- Ember: warm top-light falling to a deep ignited base -->
    <linearGradient id="ofisi-ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8703F"/>
      <stop offset="0.55" stop-color="#D0471F"/>
      <stop offset="1" stop-color="#B23A16"/>
    </linearGradient>
    <!-- A soft sheen so the tile reads like warm, lit material, not flat paint -->
    <linearGradient id="ofisi-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded ember tile -->
  <rect x="16" y="16" width="480" height="480" rx="136" fill="url(#ofisi-ember)"/>
  <rect x="16" y="16" width="480" height="480" rx="136" fill="url(#ofisi-sheen)"/>
  <!-- The "O" of Ofisi — a warm ivory ring -->
  <circle cx="256" cy="256" r="134" fill="none" stroke="#FBF3E9" stroke-width="70"/>
  <!-- Ember bead centred in the counter -->
  <circle cx="256" cy="256" r="35" fill="#FBF3E9"/>
</svg>
